<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just_Jaw</title>
  <meta name="description" content="Digital artist working in 3D, motion design, video editing, and 2D graphics." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="assets/image-videos/Jaw Logo PixelArt.png" alt="Just_Jaw Logo" style="width: 60px; height: auto; image-rendering: pixelated;" />
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-menu-btn">[ menu ]</button>
    </div>
  </nav>

  <main style="padding-top: var(--nav-h);">
    <section class="section">
      <div class="container">

        <div class="section-header" style="margin-bottom: 4rem;">
          <p class="hero-index">001 / Get in Touch</p>
        </div>

        <div class="contact-grid">

          <div>
            <p class="contact-intro">
              Available for freelance projects, commissions, and collaborations.
              Feel free to reach out — I typically respond within a day or two.
            </p>

            <div class="contact-links">
              <a href="mailto:kubaklouba@gmail.com" class="contact-link">
                <span class="contact-link-label">Email</span>
                <span class="contact-link-arrow">></span>
              </a>
              <a href="https://www.behance.net/99skobex" target="_blank" rel="noopener" class="contact-link">
                <span class="contact-link-label">Behance</span>
                <span class="contact-link-arrow">></span>
              </a>
              <a href="https://www.instagram.com/_just_a_jaw_/" target="_blank" rel="noopener" class="contact-link">
                <span class="contact-link-label">Instagram</span>
                <span class="contact-link-arrow">></span>
              </a>
              <a href="https://www.linkedin.com/in/jakub-kouba-b2198432b/" target="_blank" rel="noopener" class="contact-link">
                <span class="contact-link-label">LinkedIn</span>
                <span class="contact-link-arrow">></span>
              </a>
              <!-- Add or remove social links as needed -->
            </div>
          </div>


          <form class="contact-form" action="https://formspree.io/f/xnjyplzv" method="POST">
            <input type="hidden" name="_subject" value="New message from portfolio website" />
            <div class="form-row">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required />
              </div>
            </div>
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" placeholder="Project inquiry, collaboration…" />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Tell me about your project…" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Send Message ></button>
          </form>

        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-inner">
      <p class="footer-copy">002 / Footer</p>
      <p class="footer-copy">© 2025 <span>Jakub Kouba</span> — All rights reserved</p>
      <button class="footer-back-top">↑ Back to top</button>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
